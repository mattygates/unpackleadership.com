# Site
name: "Unpack Leadership"
title: "Lead yourself. Lead others. Lead across cultures."
description: "Leadership development and intercultural communication insights from Matt Gates."
logo: 'assets/images/logo-placeholder.svg'
favicon: 'assets/images/logo-placeholder.svg'
baseurl: ""
google_analytics: ''
include: ["_pages"]
permalink: /:title/

# Author
author:
  name: Matt Gates
  location: "Vancouver, Canada"
  email: matt.gates65@gmail.com
  headline: "Lead yourself. Lead others. Lead across cultures."
  roles: "Leadership Development · Intercultural Communication · Coaching"
  bio: "I help leaders and teams build the self-awareness, coaching skills, and cross-cultural fluency they need to lead well in a connected world."

# Social links (replace youtube placeholder with your real profile URL when ready)
social:
  linkedin: "https://www.linkedin.com/in/mattygates/"
  youtube: "#"

# Authors (used by post front matter, kept for compatibility with existing posts)
authors:
  matt:
    name: matt
    display_name: Matt Gates
    avatar: 'assets/images/placeholder-portrait.svg'
    email: matt.gates65@gmail.com
    web: https://unpackleadership.com
    description: "Leadership development and intercultural communication. Based in Vancouver, Canada."

# The four content pillars — shown in the homepage topic grid and used as post categories
topics:
  - name: "Lead Self"
    slug: "lead-self"
    description: "Self-awareness, emotional intelligence, resilience, mindset, and decision-making."
  - name: "Lead Others"
    slug: "lead-others"
    description: "Coaching, feedback, delegation, conflict management, and building trust."
  - name: "Lead Teams"
    slug: "lead-teams"
    description: "Team effectiveness, psychological safety, collaboration, and accountability."
  - name: "Lead Across Cultures"
    slug: "lead-across-cultures"
    description: "Cross-cultural communication, multicultural teamwork, and global leadership."

# Plugins
plugins:
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Pagination V2 (master switch must stay true; only pages with
# `pagination: enabled: true` in their own front matter actually get paginated — that's /articles/)
pagination:
  enabled: true
  per_page: 9
  permalink: '/page:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
