<section class="hero">
  <div class="wrap">
    <div class="hero-content">
      <div class="hero-location"><span class="dot"></span> {{ site.author.location | upcase }}</div>

      <h1>Matt<br>Gates</h1>

      <p class="hero-tagline">{{ site.author.headline }}</p>

      <p class="hero-roles">{{ site.author.roles }}</p>

      <p class="hero-bio">{{ site.author.bio }}</p>

      <a class="btn" href="{{ site.social.linkedin }}">Connect on LinkedIn</a>
    </div>

    <div class="hero-figure">
      <img src="{{ site.baseurl }}/assets/images/placeholder-hero.svg" alt="Illustration placeholder — replace with an illustration of Matt Gates">
    </div>
  </div>
</section>
