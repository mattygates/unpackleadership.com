---
layout: default
---

<div class="page-header">
  <div class="wrap">
    <span class="section-eyebrow">Videos</span>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>
</div>

<section class="section">
  <div class="wrap">
    <div class="video-grid">
      {% for video in page.videos %}
      <div class="video-card">
        <a class="video-card-thumb" href="{{ video.url | default: '#' }}">
          <img src="{{ site.baseurl }}/assets/images/placeholder-video.svg" alt="Video placeholder: {{ video.title }}">
        </a>
        <div class="video-card-body">
          <h3>{{ video.title }}</h3>
          <p>{{ video.description }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
