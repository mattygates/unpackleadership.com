<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<link rel="icon" href="{{ site.baseurl }}/{{ site.favicon }}">

<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>

{% seo %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital@1&display=swap" rel="stylesheet">

<link href="{{ site.baseurl }}/assets/css/main.css" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ site.baseurl }}/">
      <img src="{{ site.baseurl }}/{{ site.logo }}" alt="{{ site.name }} logo">
      <span>{{ site.name }}</span>
    </a>

    <nav class="main-nav" aria-label="Primary">
      <a href="{{ site.baseurl }}/"{% if page.url == "/" %} class="active"{% endif %}>Home</a>
      <a href="{{ site.baseurl }}/about"{% if page.url contains "/about" %} class="active"{% endif %}>About</a>
      <a href="{{ site.baseurl }}/videos"{% if page.url contains "/videos" %} class="active"{% endif %}>Videos</a>
    </nav>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"><span></span></button>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    <p class="footer-note">Find me on <a href="{{ site.social.linkedin }}">LinkedIn</a> for leadership insights and <a href="{{ site.social.youtube }}">YouTube</a> for videos.</p>

    <div class="social-links">
      <a href="{{ site.social.linkedin }}">LinkedIn</a>
      <a href="{{ site.social.youtube }}">YouTube</a>
    </div>

    <div class="footer-bottom">
      <span>© {{ site.time | date: "%Y" }} {{ site.name }}</span>
      <span>{{ site.author.location }}</span>
    </div>
  </div>
</footer>

<script src="{{ site.baseurl }}/assets/js/main.js"></script>

</body>
</html>
