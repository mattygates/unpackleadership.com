---
layout: default
---

<div class="topic-header">
  <div class="wrap">
    <span class="section-eyebrow">Topic</span>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>
</div>

<section class="section">
  <div class="wrap">
    <div class="card-grid">
      {% assign topic_posts = site.categories[page.category] %}
      {% for post in topic_posts %}
        {% include postbox.html post=post %}
      {% else %}
        <p>No articles in this topic yet — check back soon.</p>
      {% endfor %}
    </div>
  </div>
</section>
